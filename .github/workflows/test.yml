name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python (GitHub)
        if: env.GITEA_ACTIONS != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up venv (Gitea)
        if: env.GITEA_ACTIONS == 'true'
        run: |
          python3.12 -m venv --clear /tmp/raven-ci-venv
          echo "/tmp/raven-ci-venv/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: |
          python3 -m pip install -r requirements.txt
          python3 -m pip install pytest pytest-mock

      - name: Run tests
        run: python3 -m pytest tests/ -v --tb=short
