services:
  raven:
    build: .
    container_name: raven
    init: true
    restart: unless-stopped
    ports:
      - "8080:8080"
    # Values come from .env via ${VAR} interpolation. Add new vars
    # here when config.example.env grows — otherwise they silently
    # don't reach the container even if set in .env.
    #
    # For vars with a Python-side default (see raven/*.py), the
    # default is duplicated here as ${VAR:-<default>} so an unset
    # .env doesn't inject an empty string that would bypass the
    # Python default (int("") would crash, and Claude CLI would get
    # --model ""). Keep the two sides in sync when you change a
    # default in the code.
    environment:
      # ── Gitea (required if using Gitea; no defaults — empty means unset)
      - GITEA_WEBHOOK_SECRET=${GITEA_WEBHOOK_SECRET:-}
      - GITEA_URL=${GITEA_URL:-}
      - GITEA_TOKEN=${GITEA_TOKEN:-}
      # ── Bitbucket Data Center (required if using BB DC; no defaults)
      - BITBUCKET_DC_URL=${BITBUCKET_DC_URL:-}
      - BITBUCKET_DC_TOKEN=${BITBUCKET_DC_TOKEN:-}
      - BITBUCKET_DC_WEBHOOK_SECRET=${BITBUCKET_DC_WEBHOOK_SECRET:-}
      - BITBUCKET_DC_USERNAME=${BITBUCKET_DC_USERNAME:-}
      # ── Claude Code OAuth (CLAUDE_CODE_OAUTH_TOKEN is required; refresh is optional)
      - CLAUDE_CODE_OAUTH_TOKEN=${CLAUDE_CODE_OAUTH_TOKEN:-}
      - CLAUDE_CODE_OAUTH_REFRESH_TOKEN=${CLAUDE_CODE_OAUTH_REFRESH_TOKEN:-}
      # ── Notifications (optional — empty means no channels)
      - NOTIFY_CHANNELS=${NOTIFY_CHANNELS:-}
      # ── Review behaviour (defaults must match raven/server.py + raven/reviewer.py)
      - REVIEW_APPROVE_MAX_SEVERITY=${REVIEW_APPROVE_MAX_SEVERITY:-low}
      - MERGE_STRATEGY=${MERGE_STRATEGY:-squash}
      - MAX_DIFF_LINES=${MAX_DIFF_LINES:-3000}
      - RAVEN_MAX_FILE_LINES=${RAVEN_MAX_FILE_LINES:-500}
      - RAVEN_MAX_FILES=${RAVEN_MAX_FILES:-10}
      - RAVEN_CARRIED_REVALIDATION_MAX=${RAVEN_CARRIED_REVALIDATION_MAX:-20}
      - CI_WAIT_TIMEOUT=${CI_WAIT_TIMEOUT:-300}
      # Toggle (empty = off): require CI to register before auto-merging.
      - RAVEN_REQUIRE_CI=${RAVEN_REQUIRE_CI:-}
      # Filters: empty means no filter — don't add a fake default.
      - SKIP_REPOS=${SKIP_REPOS:-}
      - SKIP_AUTHORS=${SKIP_AUTHORS:-}
      # Toggles: empty = off. server.py parses (".lower() in 1|true|yes").
      - RAVEN_GITEA_AUTO_MERGE=${RAVEN_GITEA_AUTO_MERGE:-}
      # Review engagement mode: all | gap | advisory. Empty defaults to 'all'.
      - RAVEN_REVIEW_MODE=${RAVEN_REVIEW_MODE:-}
      # Review output channels: both | summary | inline. Empty defaults to 'both'.
      - RAVEN_REVIEW_OUTPUT=${RAVEN_REVIEW_OUTPUT:-}
      # ── AI model & effort (defaults must match raven/reviewer.py).
      # Apply to BOTH backends.
      - RAVEN_AI_MODEL=${RAVEN_AI_MODEL:-claude-opus-4-8}
      - RAVEN_AI_EFFORT=${RAVEN_AI_EFFORT:-max}
      - RAVEN_AI_EFFORT_COMMENT=${RAVEN_AI_EFFORT_COMMENT:-medium}
      - RAVEN_AI_TIMEOUT=${RAVEN_AI_TIMEOUT:-1800}
      - RAVEN_AI_RETRY=${RAVEN_AI_RETRY:-1}
      - RAVEN_AI_RETRY_BACKOFF=${RAVEN_AI_RETRY_BACKOFF:-3}
      # ── AI backend (pick ONE of the credential sets below; see README)
      - RAVEN_AI_BACKEND=${RAVEN_AI_BACKEND:-}
      - RAVEN_AI_API_BASE=${RAVEN_AI_API_BASE:-}
      - RAVEN_AI_API_KEY=${RAVEN_AI_API_KEY:-}
      - RAVEN_AI_MAX_TOKENS=${RAVEN_AI_MAX_TOKENS:-}
      # ── Comment replies (default must match raven/server.py)
      - RAVEN_COMMENT_HISTORY=${RAVEN_COMMENT_HISTORY:-20}
      - RAVEN_MAX_PR_REPLIES_PER_HOUR=${RAVEN_MAX_PR_REPLIES_PER_HOUR:-20}
      # Display names that count as an @mention (comma-separated; default
      # "Raven"). ${VAR-default} (no colon) so an explicit empty value in .env
      # disables display-name mentions (account username still matches).
      - RAVEN_MENTION_NAMES=${RAVEN_MENTION_NAMES-Raven}
      # Toggle (empty = off): reply only to comments that tag Raven (account or
      # a display name above); never on an untagged in-thread reply.
      - RAVEN_REPLY_REQUIRE_MENTION=${RAVEN_REPLY_REQUIRE_MENTION:-}
      # ── Comment reply context budgets (defaults must match raven/reviewer.py).
      # Thread block preserves root + newest replies, drops the middle.
      # Verdict body middle-truncates. See config.example.env for details.
      - RAVEN_RESPOND_THREAD_TOTAL_CHARS=${RAVEN_RESPOND_THREAD_TOTAL_CHARS:-8000}
      - RAVEN_RESPOND_VERDICT_BODY_CHARS=${RAVEN_RESPOND_VERDICT_BODY_CHARS:-4000}
      # ── Review PR-conversation context (defaults must match raven/reviewer.py)
      - RAVEN_REVIEW_COMMENT_CONTEXT=${RAVEN_REVIEW_COMMENT_CONTEXT:-20}
      - RAVEN_REVIEW_PR_CONTEXT_ITEM_CHARS=${RAVEN_REVIEW_PR_CONTEXT_ITEM_CHARS:-4000}
      - RAVEN_REVIEW_PR_CONTEXT_TOTAL_CHARS=${RAVEN_REVIEW_PR_CONTEXT_TOTAL_CHARS:-16000}
      # ── Review rules injection (defaults must match raven/server.py + raven/reviewer.py)
      # Intentionally ${VAR-default} (no colon) for RAVEN_RULES_DIR so
      # setting it to an empty string in .env disables the feature as
      # documented — ${VAR:-default} would substitute on empty and
      # silently fall back to the default, breaking the disable switch.
      - RAVEN_RULES_DIR=${RAVEN_RULES_DIR-.claude/rules}
      - RAVEN_REVIEW_RULES_TOTAL_CHARS=${RAVEN_REVIEW_RULES_TOTAL_CHARS:-16000}
      # ── Raven internals (defaults must match raven/server.py + raven/providers/gitea.py)
      - RAVEN_LABEL_NAME=${RAVEN_LABEL_NAME:-raven-reviewed}
      - RAVEN_MAX_WORKERS=${RAVEN_MAX_WORKERS:-16}
      - RAVEN_CI_WAIT_WORKERS=${RAVEN_CI_WAIT_WORKERS:-32}
      - RAVEN_AI_MAX_CONCURRENT=${RAVEN_AI_MAX_CONCURRENT:-4}
      - RAVEN_MAX_CACHED_PRS=${RAVEN_MAX_CACHED_PRS:-200}
      # ── Observability (empty = /metrics returns 404; see raven/server.py).
      # When set, Prometheus must send `Authorization: Bearer <token>`.
      - RAVEN_METRICS_TOKEN=${RAVEN_METRICS_TOKEN:-}
      # Fallback AI price table (JSON, $/1M tokens) for raven_ai_cost_usd_total.
      # Only used for endpoints that don't self-report cost; claude_cli +
      # LiteLLM report it natively. Empty = no fallback (tokens still tracked).
      - RAVEN_AI_PRICES=${RAVEN_AI_PRICES:-}
      # Cache dir must live on the named volume — override any .env value.
      - RAVEN_CACHE_DIR=/data/raven
    volumes:
      - raven-cache:/data/raven
    # Use Docker's built-in json-file driver with rotation so the
    # container's stdout/stderr doesn't fill the host disk over time.
    # 10 MB per file × 5 files = ~50 MB ceiling per container. Operators
    # needing centralised logging can override with a different driver
    # (syslog, fluentd, etc.) via docker-compose.override.yml.
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── Observability (opt-in) ──────────────────────────────────────────────
  # Only starts with:  docker compose --profile observability up -d
  # Plain `docker compose up -d` runs Raven alone (no profile = excluded).
  # See observability/README.md and docs/superpowers/specs/2026-05-29-observability-stack-design.md
  prometheus:
    image: prom/prometheus:v3.1.0
    container_name: raven-prometheus
    profiles: ["observability"]
    restart: unless-stopped
    # /metrics is bearer-gated. Prometheus config has no env-var
    # substitution, so we write the token to a file at boot (the image's
    # busybox sh + printf) and point `credentials_file` at it. `$$` keeps
    # compose from interpolating — the shell expands the container env var.
    environment:
      - RAVEN_METRICS_TOKEN=${RAVEN_METRICS_TOKEN:-}
    entrypoint:
      - /bin/sh
      - -c
      - |
        printf '%s' "$${RAVEN_METRICS_TOKEN}" > /tmp/raven_metrics_token
        exec /bin/prometheus \
          --config.file=/etc/prometheus/prometheus.yml \
          --storage.tsdb.path=/prometheus \
          --storage.tsdb.retention.time=1825d
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - raven-prom-data:/prometheus
    depends_on:
      - raven
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  grafana:
    image: grafana/grafana:11.4.0
    container_name: raven-grafana
    profiles: ["observability"]
    restart: unless-stopped
    ports:
      # Bound to localhost by default so the admin-password fallback ("admin")
      # is never reachable on all interfaces. For off-host access, override
      # this binding (e.g. via docker-compose.override.yml) behind a reverse
      # proxy AND set GRAFANA_ADMIN_PASSWORD.
      - "127.0.0.1:${GRAFANA_PORT:-3000}:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - raven-grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

volumes:
  raven-cache:
  raven-prom-data:
  raven-grafana-data:
